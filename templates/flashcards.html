{% extends "layout.html" %}

{% block title %}
    Flashcards
{% endblock %}

{% block main %}
    <div class="container min-vh-100 d-flex flex-column align-items-center main-content justify-content-center">
        <div class="card card-mono mx-auto my-3" style="width: 18rem;">
            <div class="card-body py-2 px-3">
                <h5 style="font-weight: 650" class="card-title py-3" id="flashcard-text"></h5>
                <a href="#" class="btn btn-mono-outline btn-normal-case" id="toggle-btn">Show translation</a>
            </div>
        </div>
    <div class="btn-group" role="group">
        <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('forgot')">Forgot</button>
        <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('hard')">Hard</button>
        <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('normal')">Normal</button>
        <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('easy')">Easy</button>
    </div>
    </div>

    <script>
        const words = {{ words | safe }};
        let num = 0;
        let showingWord = true;
        let word = '';
        let translation = '';
        let finish = false;
        document.addEventListener('DOMContentLoaded', function() {
            if (words.length === 0) { 
                exit("empty");
            } else {
                word = words[num].word;
                translation = words[num].translation;
                document.getElementById('flashcard-text').textContent = word;
            }

            document.getElementById('toggle-btn').addEventListener('click', function(e) {
                if (finish) return;
                e.preventDefault();
                const textElem = document.getElementById('flashcard-text');
                if (showingWord) {
                    textElem.textContent = translation;
                    this.textContent = "Show word";
                } else {
                    textElem.textContent = word;
                    this.textContent = "Show translation";
                }
                showingWord = !showingWord;
            });
        });

        async function showNextCard() {
            num++;
            if (num >= words.length)
            {
                exit("finish");
                return ;
            }
            word = words[num].word;
            translation = words[num].translation;
            document.getElementById('toggle-btn').textContent = "Show translation";
            showingWord = true;
            document.getElementById('flashcard-text').textContent = word;
        }

        async function answer(quality) {
            const currentWord = word;
            showNextCard();
            try {
                await fetch('/flashcards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: currentWord, quality: quality })
                });
            } catch (error) {
                console.error("Net error:", error);
            }
        }

        function disable() {
            const toggle = document.getElementById('toggle-btn')
            toggle.textContent = "To main page"
            toggle.href = "/";
            toggle.style.pointerEvents = "auto";
            const buttons=document.getElementsByClassName('btn-primary');
            for (let i = 0; i < buttons.length; i++)
            {
                buttons[i].disabled = true;
            }
        }

        function exit(reason)
        {
            finish = true;
            if (reason == 'empty')
            {
                word = "No cards for this time";
            }
            else if (reason == 'finish')
            {
                word = "Task finished";
            }
            document.getElementById('flashcard-text').textContent = word;
            disable();
        }
        </script>
{% endblock %}
