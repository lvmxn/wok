{% extends "layout.html" %}

{% block title %}
    Flashcards
{% endblock %}

{% block main %}
    <div class="modal fade " id="collectionModal" tabindex="-1" aria-hidden="true">
        <div class=" modal-dialog modal-dialog-centered">
            <div class="collectionModal modal-content border ">
                <div  class="collectionModal modal-header ">
                    <h5 class="modal-title ">Choose your option</h5>
                </div>
                <div class="modal-body">
                    <p class="mb-3">Pick what you want to practice before starting.</p>
                    <div class="d-flex flex-column flex-md-row align-items-start gap-4 gap-md-5 mb-4">
                        <select class="form-select inp-txt" id="mode-select">
                            <option value="traning">Traning mode</option>
                            <option value="free">Free mode</option>
                        </select>
                        <select class="form-select inp-txt" id="collection-select">
                            <option value="all">All words</option>
                            {% for tag in tags %}
                                <option value="{{ tag["name"] }}">{{ tag["name"] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer ">
                    <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" id="start-task-btn">Start</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container min-vh-100 d-flex flex-column align-items-center main-content justify-content-center">
        <h1 class="mb-2">Flashcards</h1>
        <h5 class="mb-2" id="counter"></h5>
        <div class="card card-mono mx-auto my-3" style="width: 18rem;">
            <div class="card-body py-2 px-3 text-center"> 
                <div id="flashcard-text-wrapper" style="cursor: pointer;" onclick="speakCurrentWord()">
                    <h5 style="font-weight: 650; margin-bottom: 0;" class="card-title py-3" id="flashcard-text"></h5>
                </div>
                <p id="context"></p>
                <div class="mt-2">
                    <a href="#" class="btn btn-mono-outline btn-normal-case" id="toggle-btn">Show translation</a>
                </div>
            </div>
        </div>
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('forgot')">Forgot</button>
            <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('hard')">Hard</button>
            <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('normal')">Normal</button>
            <button type="button" class="btn btn-primary btn-mono-outline btn-normal-case" onclick="answer('easy')">Easy</button>
        </div>
    </div>

    <script>
        let words = [];
        let num = 0;
        let showingWord = true;
        let word = '';
        let id = null;
        let context = null;
        let translation = '';
        let finish = false;
        let currentAudio = null;
        let nextAudio = null;
        let tag = '';
        let mode = '';

        document.addEventListener('DOMContentLoaded', function() {
            const collectionModal = new bootstrap.Modal(document.getElementById('collectionModal'), {
                backdrop: false,
                keyboard: false
            });
            collectionModal.show();
            document.getElementById('start-task-btn').addEventListener('click', async function() {
                tag = document.getElementById('collection-select').value;
                mode = document.getElementById('mode-select').value;
                try {
                    await get_words();
                    collectionModal.hide();
                } catch (error) {
                    console.error(error);
                }                
            });
        });

        async function get_words() {
            const response = await fetch('/flashcards', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'start', mode, tag })
            });

            if (!response.ok) {
                throw new Error(await response.text());
            }

            words = await response.json();
            initFlashcards();
        }
        
        function initFlashcards(){
            if (words.length === 0) { 
                exit("empty");
            } 
            else {
                word = words[num].word;
                translation = words[num].translation;
                id = words[num].id;
                if (words[num].context) {
                    context = words[num].context
                }
                else{
                    context = null;
                }
                document.getElementById('flashcard-text').textContent = word;
                document.getElementById('context').textContent = context;
                document.getElementById('counter').textContent = `Card ${num + 1} of ${words.length}`;
                currentAudio = preloadAudio(word);
                if (words.length > 1) {
                    nextAudio = preloadAudio(words[1].word);
                }
            }

            document.getElementById('toggle-btn').addEventListener('click', function(e) {
                if (finish) return;
                e.preventDefault();
                const textElem = document.getElementById('flashcard-text');
                if (showingWord) {
                    textElem.textContent = translation;
                    this.textContent = "Show word";
                } else {
                    textElem.textContent = word;
                    this.textContent = "Show translation";
                }
                showingWord = !showingWord;
            });
        }

        async function showNextCard() {
            num++;
            if (num >= words.length)
            {
                exit("finish");
                return ;
            }
            document.getElementById('counter').textContent = `Card ${num + 1} of ${words.length}`;
            word = words[num].word;
            translation = words[num].translation;
            id = words[num].id;
            if (words[num].context) {
                context = words[num].context
            }
            else{
                context = null;
            }
            document.getElementById('toggle-btn').textContent = "Show translation";
            showingWord = true;
            document.getElementById('flashcard-text').textContent = word;
            document.getElementById('context').textContent = context;
            if (currentAudio) currentAudio.pause();
            currentAudio = nextAudio;
            if (num + 1 < words.length) {
                nextAudio = preloadAudio(words[num + 1].word);
            } 
            else {
                nextAudio = null;
            }
        }

        async function answer(quality) {
            if (quality == "forgot"){
                words.push({word : word, translation : translation, id : id, context : context});
            }
            const currentid = id;
            showNextCard();
            try {
                await fetch('/flashcards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({action: 'answer', id : currentid, quality: quality })
                });
            } catch (error) {
                console.error("Net error:", error);
            }
        }

        function disable() {
            const toggle = document.getElementById('toggle-btn')
            toggle.textContent = "To main page"
            toggle.href = "/";
            toggle.style.pointerEvents = "auto";
            const buttons=document.getElementsByClassName('btn-primary');
            for (let i = 0; i < buttons.length; i++)
            {
                buttons[i].disabled = true;
            }
        }

        function exit(reason)
        {
            finish = true;
            if (reason == 'empty')
            {
                word = "No cards for this time";
            }
            else if (reason == 'finish')
            {
                word = "Task finished";
            }
            document.getElementById('flashcard-text').textContent = word;
            document.getElementById('context').textContent = '';
            disable();
        }

        function preloadAudio(text) {
            if (!text) return null;
            const url = `/api/tts?word=${encodeURIComponent(text)}`;
            const audio = new Audio(url);
            audio.playbackRate = 1;
            audio.load();
            return audio;
        }

        function speakCurrentWord() {
            if (currentAudio) {
                currentAudio.currentTime = 0;
                currentAudio.play().catch(err => console.error("TTS Replay error:", err));
            }
        }
        </script>
{% endblock %}
