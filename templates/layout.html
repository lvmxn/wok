<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOK: {% block title %}{% endblock %}</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div>
        <header >
            <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="/" aria-current="page">
                    <img src="/static/wok.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top">
                    WOK
                    </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link" href="#">Add</a>
                    <a class="nav-link" href="/tasks">Tasks</a>
                </div>
                <div class="ms-auto d-flex navbar-nav">
                    {% if not session.get('user_id') %}
                        <a class="nav-link" href="/register">Register</a>
                        <a class="nav-link" href="/login">Login</a>
                    {% else %}
                        <a class="nav-link" href="/logout">Log out</a>
                        <a class="nav-link" href="/">{{ username }}</a>
                    {% endif %}
                </div>
                </div>
            </div>
            </nav>
        </header>
    </div>

    <main class="container py-5 text-center">
        {% block main %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-3 w-100" style="font-size: 0.95em; left:0; bottom:0; z-index:100;">
        &copy; 2026 WOK &mdash; Made for CS50<br>
        Developer: lvmxn &mdash; <a href="mailto:lukanindan@gmail.com" class="text-muted">lukanindan@gmail.com</a>
    </footer>
</body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
